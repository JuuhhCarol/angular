<div class="_produtos">
  <div class="_produto" *ngFor="let produto of produtos"
       (click)="abrirModal(produto)">

    <img [src]="produto.image" alt="{{ produto.name }}" />
    <p>{{ produto.name }}</p>
    <p>R$ {{ produto.price }}</p>

  </div>
</div>

<app-modal-comida
  [aberto]="modalAberto"
  [comida]="comidaSelecionada"
  (fechar)="fecharModal()">
</app-modal-comida>
